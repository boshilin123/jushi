apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jushi-alert-cluster-read
rules:
  - apiGroups: [""]
    resources: ["pods", "events", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jushi-alert-cluster-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: jushi-alert-cluster-read
subjects:
  - kind: ServiceAccount
    name: jushi-deploy-api
    namespace: algorithm
