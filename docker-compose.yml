services:
  jushi-frontend:
    build:
      context: ./ui
    container_name: jushi-frontend
    ports:
      - "18000:80"
    depends_on:
      - jushi-api
    restart: unless-stopped

  jushi-api:
    build:
      context: ./backend
    container_name: jushi-api
    env_file:
      - .env.example
    depends_on:
      jushi-mysql:
        condition: service_healthy
      jushi-port-list:
        condition: service_started
    restart: unless-stopped

  jushi-port-list:
    build:
      context: ./backend
    container_name: jushi-port-list
    command: python port_list_app.py
    env_file:
      - .env.example
    restart: unless-stopped

  jushi-mysql:
    image: mysql:8.0
    container_name: jushi-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: jushi
      MYSQL_USER: jushi
      MYSQL_PASSWORD: jushi_pass
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ujushi", "-pjushi_pass"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
